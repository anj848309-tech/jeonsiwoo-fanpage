<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>JEONG SIWOO</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(black,#111);
}

h1{
    font-size:80px;
    margin-bottom:20px;
}

.glow{
    font-size:32px;
    font-weight:bold;
    animation:sparkle 1.2s infinite alternate;
    text-shadow:
      0 0 10px gold,
      0 0 20px gold,
      0 0 40px orange;
}

@keyframes sparkle{
    from{
        opacity:0.7;
        transform:scale(1);
    }
    to{
        opacity:1;
        transform:scale(1.05);
    }
}

.section{
    padding:100px 20px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>JEONG SIWOO</h1>
    <p class="glow">그의 위장은 아직 배고프다 ✨</p>
    <img src="KakaoTalk_20260701.jpg" class="main-photo">
</div>

<div class="section">
    <h2>먹기 위해 태어난 남자</h2>
</div>

<div class="section">
    <h2>포만감? 그런 건 없다</h2>
</div>

</body>
</html>
